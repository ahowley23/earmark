# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/earmark
spring.datasource.username=audreyhowley
spring.datasource.password=

# JPA/Hibernate — validate means Hibernate checks the schema matches
# your entities but never modifies it — Flyway owns schema changes
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.jpa.open-in-view=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=none
anthropic.api.key=replace-with-real-key
spring.profiles.active=local
